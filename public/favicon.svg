<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Circle background -->
  <circle cx="50" cy="50" r="50" fill="#43766C"/>

  <!-- Inner ring 1 -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#FDFDF1" stroke-width="1" opacity="0.25"/>

  <!-- Inner ring 2 -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#FDFDF1" stroke-width="0.6" opacity="0.12"/>

  <!-- H left bar -->
  <rect x="22" y="28" width="16" height="44" rx="4" fill="#FDFDF1"/>

  <!-- H right bar -->
  <rect x="62" y="28" width="16" height="44" rx="4" fill="#FDFDF1"/>

  <!-- H crossbar -->
  <rect x="22" y="44" width="56" height="12" rx="3" fill="#FDFDF1"/>

  <!-- Negative space punch — top middle -->
  <rect x="38" y="28" width="24" height="16" rx="2" fill="#43766C"/>

  <!-- Negative space punch — bottom middle -->
  <rect x="38" y="56" width="24" height="16" rx="2" fill="#43766C"/>
</svg>
